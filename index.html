
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick Up Notifier</title>
    <style>
        /* Change the background color and layout here */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: #1e1e24; /* Dark sleek background */
            color: #ffffff; 
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }
        /* Style for your massive text alert */
        #alertContainer {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #alertText { 
            font-size: 42px; /* Super large text */
            font-weight: bold; 
            color: #ff4757; /* Eye-catching coral red text */
            line-height: 1.3;
        }
        /* Settings panel at the bottom */
        .settings { 
            background: rgba(255,255,255,0.1); 
            padding: 20px; 
            border-radius: 16px;
            margin-bottom: 20px;
        }
        input { 
            padding: 12px; 
            font-size: 16px; 
            width: 85%; 
            max-width: 300px; 
            margin-bottom: 12px; 
            border-radius: 8px; 
            border: none; 
        }
        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            background: #007aff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Massive Text Display Area -->
    <div id="alertContainer">
        <div id="alertText"></div>
    </div>

    <!-- Personalization Settings Area at Bottom -->
    <div class="settings">
        <input type="text" id="customText" value="Put down the phone!" placeholder="Enter message...">
        <br>
        <button onclick="saveText()">Save Message</button>
    </div>

    <script>
        function saveText() {
            localStorage.setItem('notifyText', document.getElementById('customText').value);
            alert('Message saved!');
            location.reload(); // Refresh to show new text
        }

        // Load saved text on open
        const savedMessage = localStorage.getItem('notifyText') || "Put down the phone!";
        document.getElementById('customText').value = savedMessage;

        function checkNotification() {
            const now = Date.now();
            const lastTime = localStorage.getItem('lastPickUpTime') || 0;
            const tenMinutes = 10 * 60 * 1000; // 10 minutes

            // If 10 minutes have passed
            if (now - lastTime >= tenMinutes) {
                // Show the massive message on screen
                document.getElementById('alertText').innerText = savedMessage;
            } else {
                // If it hasn't been 10 minutes, clear the message area so it stays blank/clean
                document.getElementById('alertText').innerText = "";
            }
            
            // Update timestamp
            localStorage.setItem('lastPickUpTime', now);
        }

        window.onload = checkNotification;
    </script>
</body>
</html>
