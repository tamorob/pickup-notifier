<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡</title>
    <style>
        body { 
            margin: 0;
            padding: 20px;
            background: #32CD32; /* Lime Green */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
        }
        h1 { 
            font-family: -apple-system, sans-serif;
            font-size: 54px; 
            font-weight: 900; 
            color: #000000; /* Black text */
            text-align: center;
            line-height: 1.1;
            margin: 0;
        }
    </style>
</head>
<body>

    <h1>Put down the phone!</h1>

    <script>
        window.onload = function() {
            // Wait 3 seconds (3000 milliseconds) for you to read the text
            setTimeout(function() {
                // This special deep link forces iOS to immediately open the Facebook app
                window.location.href = "fb://"; 
            }, 3000);
        };
    </script>
</body>
</html>
